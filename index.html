<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CinéScore Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --imdb-yellow: #f5c518;
            --bg-p: #000000;
            --bg-card: #121212;
            --t-p: #ffffff;
            --t-s: #a2a2a2;
        }
        
        body { 
            background: var(--bg-p);
            color: var(--t-p); 
            font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 120px; 
            overflow-x: hidden;
        }

        /* --- MODAL 100% OPAQUE --- */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000000; /* Noir opaque */
            z-index: 10000; 
            overflow-y: auto; 
        }
        .modal-content { padding: 0; padding-bottom: 100px; }
        
        /* On cache le bouton retour comme demandé */
        .close-btn { display: none; }

        .brand-title {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            color: #4caf50;
            font-size: 18px;
            font-weight: 900;
            margin-top: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .brand-title span {
            font-size: 10px; color: #888; letter-spacing: 1px;
            font-family: 'Inter', sans-serif; font-weight: 400;
            display: block; margin-top: -5px;
        }

        .must-tab-bar {
            position: fixed; bottom: 30px; left: 20px; right: 20px;
            height: 65px; background: rgba(15, 15, 15, 0.95); 
            backdrop-filter: blur(10px); display: flex; 
            justify-content: space-around; align-items: center;
            border: 1px solid #333; border-radius: 25px; z-index: 9999;
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; opacity: 0.5; flex: 1; cursor: pointer; }
        .tab-item.active { opacity: 1; color: var(--imdb-yellow); }
        .tab-emoji { font-size: 18px; }
        .tab-label { font-size: 8px; font-weight: 700; text-transform: uppercase; margin-top: 2px; text-align: center; }

        .header-ios { padding: 20px 15px 10px; }
        .header-ios h1 { font-size: 24px; font-weight: 900; margin: 0; text-transform: uppercase; }
        .section-title { font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--imdb-yellow); padding: 15px; text-transform: uppercase; }

        .grid-3col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px 15px; }
        
        .poster-card { 
            aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; 
            background: var(--imdb-yellow); position: relative; border: 1px solid #333; cursor: pointer; 
        }
        .poster-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .no-poster { 
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; 
            text-align: center; font-weight: 900; font-size: 11px; padding: 10px;
            box-sizing: border-box; text-transform: uppercase; color: #000;
        }

        .search-bar { margin: 0 15px 15px; background: #1a1a1a; padding: 12px; border-radius: 10px; display: flex; align-items: center; border: 1px solid #333; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; font-size: 16px; }

        .review-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; margin: 0 15px 15px; display: flex; gap: 15px; }
        .review-poster { width: 60px; aspect-ratio: 2/3; border-radius: 6px; object-fit: cover; }
        .review-note { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; padding: 4px 8px; border-radius: 6px; color: black; }

        /* --- STYLE PROFIL ACTEUR --- */
        .actor-header { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .actor-header img { width: 180px; height: 180px; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .actor-name-big { font-family: 'Orbitron'; font-size: 28px; color: var(--imdb-yellow); margin: 0 0 10px 0; font-weight: 900; }
        .actor-info-line { font-size: 14px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        /* --- NOUVELLE FICHE FILM XXL --- */
        .hero-poster-xxl { width: 100%; height: 75vh; display: block; border-radius: 20px; object-fit: cover; }
        .movie-info-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .movie-info-main h2 { font-size: 24px; margin: 0; font-weight: 900; color: white; }
        .movie-metadata { font-size: 13px; color: var(--t-s); margin-top: 6px; }
        .score-badge-xxl { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; color: var(--imdb-yellow); border: 1px solid rgba(245, 197, 24, 0.3); }
        .cast-rect-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px 20px; }
        .cast-rect-scroll::-webkit-scrollbar { display: none; }
        .actor-rect-card { flex: 0 0 110px; height: 160px; border-radius: 12px; overflow: hidden; position: relative; }
        .actor-rect-card img { width: 100%; height: 100%; object-fit: cover; }
        .actor-rect-name { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, black); color: white; font-size: 10px; padding: 15px 5px 5px; text-align: center; }
        .my-review-white-card { background: white; margin: 20px; border-radius: 20px; padding: 20px; color: black; }
        .trailer-video { width: 100%; aspect-ratio: 16/9; border-radius: 15px; border: none; }
    </style>
</head>
<body>

    <div id="view"></div>

    <div id="fullModal" class="modal">
        <div class="modal-content">
            <div id="modal-body"></div>
        </div>
    </div>

    <nav class="must-tab-bar">
        <div class="tab-item active" onclick="renderSorties()">
            <span class="tab-emoji">🍿</span>
            <span class="tab-label">Nouv.<br>Sorties</span>
        </div>
        <div class="tab-item" onclick="renderSearch()">
            <span class="tab-emoji">🔍</span>
            <span class="tab-label">Recherche</span>
        </div>
        <div class="tab-item" onclick="renderMesTop()">
            <span class="tab-emoji">🏆</span>
            <span class="tab-label">Mes Tops</span>
        </div>
        <div class="tab-item" onclick="renderCritiques()">
            <span class="tab-emoji">✍️</span>
            <span class="tab-label">Mes Critiques</span>
        </div>
    </nav>

    <script>
        const API_KEY = "f59231e7c7085af32a303eb181358453";
        const IMG_PATH = "https://image.tmdb.org/t/p/w500";
        const FIREBASE_URL = "https://cinescore-56854-default-rtdb.europe-west1.firebasedatabase.app/data.json";

        let db = { tops: { movies: [], series: [], actors: [] }, reviews: [] };

        // --- GESTION DU SWIPE POUR FERMER ---
        let touchstartX = 0;
        let touchendX = 0;

        const modal = document.getElementById('fullModal');
        modal.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, false);
        modal.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (touchstartX < 60 && touchendX - touchstartX > 100) closeModal();
        }, false);

        function closeModal() { modal.style.display = 'none'; document.getElementById('modal-body').innerHTML = ''; }

        async function loadData() {
            try {
                const res = await fetch(FIREBASE_URL);
                const cloudData = await res.json();
                if (cloudData) db = cloudData;
            } catch (e) { console.error(e); }
        }

        async function syncFirebase() {
            try { await fetch(FIREBASE_URL, { method: 'PUT', body: JSON.stringify(db) }); } catch (e) { }
        }

        function setActive(index) {
            document.querySelectorAll('.tab-item').forEach((t, i) => t.classList.toggle('active', i === index));
        }

        async function renderSorties() {
            setActive(0);
            document.getElementById('view').innerHTML = `<div class="header-ios"><h1>Nouvelles Sorties</h1></div><div id="trailers-container">Chargement...</div>`;
            const res = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}&language=fr-FR`);
            const data = await res.json();
            let html = '';
            for (let m of data.results.slice(0, 10)) {
                const vRes = await fetch(`https://api.themoviedb.org/3/movie/${m.id}/videos?api_key=${API_KEY}&language=fr-FR`);
                const vData = await vRes.json();
                let trailer = vData.results.find(v => v.type === 'Trailer');
                if (trailer) {
                    html += `<div style="margin: 15px; position:relative; aspect-ratio:16/9; border-radius:12px; overflow:hidden;" onclick="renderMovieDetails(${m.id})">
                        <img src="${IMG_PATH + m.backdrop_path}" style="width:100%; height:100%; object-fit:cover;">
                        <div style="position:absolute; bottom:0; left:0; width:100%; padding:15px; background:linear-gradient(transparent, rgba(0,0,0,0.9));">
                            <div style="font-weight:900; font-size:18px;">${m.title}</div>
                        </div>
                    </div>`;
                }
            }
            document.getElementById('trailers-container').innerHTML = html;
        }

        async function renderSearch() {
            setActive(1);
            document.getElementById('view').innerHTML = `<div class="header-ios"><h1>Recherche</h1></div><div class="search-bar"><input type="text" placeholder="Rechercher..." oninput="executeSearch(this.value)"></div><div id="search-results-area"></div>`;
        }

        async function executeSearch(query) {
            if(query.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${query}&language=fr-FR`).then(r => r.json());
            document.getElementById('search-results-area').innerHTML = `<div class="grid-3col">${res.results.map(i => `
                <div class="poster-card" onclick="${i.media_type==='person'?'renderActorProfile':'renderMovieDetails'}(${i.id})">
                    ${(i.poster_path || i.profile_path) ? `<img src="${IMG_PATH + (i.poster_path || i.profile_path)}">` : `<div class="no-poster">${i.title || i.name}</div>`}
                </div>`).join('')}</div>`;
        }

        async function renderMovieDetails(id) {
            modal.style.display = 'block';
            const [m, c, v] = await Promise.all([
                fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=fr-FR`).then(r => r.json()),
                fetch(`https://api.themoviedb.org/3/movie/${id}/credits?api_key=${API_KEY}&language=fr-FR`).then(r => r.json()),
                fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}&language=fr-FR`).then(r => r.json())
            ]);
            const trailer = v.results.find(vid => vid.type === 'Trailer' && vid.site === 'YouTube');
            let html = `<div class="movie-details-container"><img src="${IMG_PATH + m.poster_path}" class="hero-poster-xxl">
                <div class="movie-info-bar"><div><h2>${m.title}</h2><div class="movie-metadata">${m.release_date.split('-')[0]}</div></div><div class="score-badge-xxl">⭐ ${m.vote_average.toFixed(1)}</div></div>
                <div class="cast-rect-scroll">${c.cast.slice(0, 10).map(a => `<div class="actor-rect-card" onclick="renderActorProfile(${a.id})"><img src="${IMG_PATH + a.profile_path}"><div class="actor-rect-name">${a.name}</div></div>`).join('')}</div>
                <div style="padding:20px;">${m.overview}</div>`;
            if (trailer) html += `<div style="padding:20px;"><iframe class="trailer-video" src="https://www.youtube.com/embed/${trailer.key}" frameborder="0" allowfullscreen></iframe></div>`;
            document.getElementById('modal-body').innerHTML = html + `</div>`;
        }

        // --- NOUVELLE FONCTION FILMOGRAPHIE ---
        async function renderActorProfile(id) {
            modal.style.display = 'block';
            document.getElementById('modal-body').innerHTML = `<p style="text-align:center; padding:50px;">Chargement...</p>`;
            
            try {
                const [p, c] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/person/${id}?api_key=${API_KEY}&language=fr-FR`).then(r => r.json()),
                    fetch(`https://api.themoviedb.org/3/person/${id}/combined_credits?api_key=${API_KEY}&language=fr-FR`).then(r => r.json())
                ]);

                // Calcul âge et lieu
                const age = p.birthday ? Math.floor((new Date() - new Date(p.birthday)) / 31557600000) + " ans" : "Âge inconnu";
                const place = p.place_of_birth ? p.place_of_birth.split(',') : ["Inconnu"];
                const city = place[0].trim();
                const country = place[place.length - 1].trim();

                // Tri par date décroissante
                const sortByDate = (a, b) => {
                    const dateA = a.release_date || a.first_air_date || '0000-00-00';
                    const dateB = b.release_date || b.first_air_date || '0000-00-00';
                    return dateB.localeCompare(dateA);
                };

                const movies = c.cast.filter(m => m.media_type === 'movie').sort(sortByDate);
                const series = c.cast.filter(m => m.media_type === 'tv').sort(sortByDate);

                let html = `
                    <div class="actor-header">
                        <img src="${IMG_PATH + p.profile_path}">
                        <h1 class="actor-name-big">${p.name}</h1>
                        <div class="actor-info-line">${age} • ${city} • ${country}</div>
                    </div>

                    <div class="section-title">Films</div>
                    <div class="grid-3col">
                        ${movies.map(m => `
                            <div class="poster-card" onclick="renderMovieDetails(${m.id})">
                                ${m.poster_path ? `<img src="${IMG_PATH + m.poster_path}">` : `<div class="no-poster">${m.title}</div>`}
                            </div>`).join('')}
                    </div>

                    <div class="section-title">Séries</div>
                    <div class="grid-3col">
                        ${series.map(s => `
                            <div class="poster-card" onclick="renderMovieDetails(${s.id})">
                                ${s.poster_path ? `<img src="${IMG_PATH + s.poster_path}">` : `<div class="no-poster">${s.name}</div>`}
                            </div>`).join('')}
                    </div>
                `;
                document.getElementById('modal-body').innerHTML = html;
            } catch (e) { document.getElementById('modal-body').innerHTML = "Erreur de chargement"; }
        }

        async function renderMesTop() {
            setActive(2);
            let html = `<div class="header-ios"><h1>Mes Tops</h1></div>`;
            ['movies', 'series', 'actors'].forEach(type => {
                html += `<div class="section-title">Top ${type}</div><div class="grid-3col">
                    ${db.tops[type].map(item => `<div class="poster-card"><img src="${item.img}"></div>`).join('')}
                </div>`;
            });
            document.getElementById('view').innerHTML = html;
        }

        function renderCritiques() {
            setActive(3);
            const reviews = db.reviews || [];
            document.getElementById('view').innerHTML = `<div class="header-ios"><h1>Mes Critiques</h1></div>
                ${reviews.map(r => `<div class="review-card"><img src="${r.img}" class="review-poster"><div><h3>${r.name}</h3><div class="review-note">${r.note}/10</div><p>"${r.text}"</p></div></div>`).join('')}`;
        }

        loadData().then(() => renderSorties());
    </script>
</body>
</html>
