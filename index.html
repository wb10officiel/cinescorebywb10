<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CinéScore Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --imdb-yellow: #f5c518;
            --bg-p: #000000;
            --bg-card: #121212;
            --t-p: #ffffff;
            --t-s: #a2a2a2;
            --rate-green: #4caf50;
            --rate-yellow: #fdd835;
            --rate-orange: #ff9800;
            --rate-red: #f44336;
        }
        
        body { 
            background: var(--bg-p);
            color: var(--t-p); 
            font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 120px; 
            overflow-x: hidden;
        }

        .brand-title {
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            color: #4caf50;
            font-size: 18px;
            font-weight: 900;
            margin-top: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .brand-title span {
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            display: block;
            margin-top: -5px;
        }

        .must-tab-bar {
            position: fixed; 
            bottom: 30px;
            left: 20px;
            right: 20px;
            width: auto; 
            height: 65px;
            background: rgba(15, 15, 15, 0.95); 
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            border: 1px solid #333; 
            border-radius: 25px;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .tab-item { display: flex; flex-direction: column; align-items: center; opacity: 0.5; flex: 1; cursor: pointer; }
        .tab-item.active { opacity: 1; color: var(--imdb-yellow); }
        .tab-emoji { font-size: 18px; }
        .tab-label { font-size: 8px; font-weight: 700; text-transform: uppercase; margin-top: 2px; text-align: center; }

        .header-ios { padding: 20px 15px 10px; }
        .header-ios h1 { font-size: 24px; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: -0.5px; }
        .section-title { font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--imdb-yellow); padding: 15px; text-transform: uppercase; }

        .h-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 0 15px 15px; scroll-snap-type: x mandatory; }
        .h-scroll::-webkit-scrollbar { display: none; }
        
        .poster-card { flex: 0 0 120px; aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; background: #1a1a1a; position: relative; border: 1px solid #333; scroll-snap-align: start; cursor: pointer; }
        .poster-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .no-poster { 
            background: var(--imdb-yellow);
            color: #000; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            text-align: center; font-weight: 900; font-size: 10px; padding: 5px;
            box-sizing: border-box; text-transform: uppercase; word-wrap: break-word;
        }

        .grid-3col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 15px 15px; }
        .grid-5col { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 0 15px 15px; }

        .search-bar { margin: 0 15px 15px; background: #1a1a1a; padding: 12px; border-radius: 10px; display: flex; align-items: center; border: 1px solid #333; }
        .search-bar input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; font-size: 16px; font-weight: 600;}

        .btn-big-add { 
            background: var(--imdb-yellow);
            color: black; font-size: 30px; font-weight: 900; 
            width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center;
            margin: 20px auto; cursor: pointer; box-shadow: 0 4px 15px rgba(245, 197, 24, 0.4); border: none;
        }
        
        .review-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 15px; margin: 0 15px 15px; display: flex; gap: 15px; }
        .review-poster { width: 60px; aspect-ratio: 2/3; border-radius: 6px; object-fit: cover; }
        .review-note { font-family: 'Orbitron'; font-size: 18px; font-weight: 900; padding: 4px 8px; border-radius: 6px; display: inline-block; color: black; }
        .review-text { font-size: 12px; color: #ccc; margin-top: 8px; line-height: 1.4; }

        .stats-ribbon { display: flex; justify-content: space-around; background: var(--bg-card); padding: 15px; margin: 15px; border-radius: 12px; border: 1px solid #222; }
        .stat-box { text-align: center; }
        .stat-val { display: block; font-size: 24px; font-family: 'Orbitron'; font-weight: 900; color: var(--imdb-yellow); }
        .stat-lbl { font-size: 9px; color: var(--t-s); text-transform: uppercase; font-weight: 700; margin-top: 4px;}

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; overflow-y: auto; padding-bottom: 50px;}
        .modal-content { padding: 20px; padding-bottom: 100px; }
        .close-btn { color: var(--imdb-yellow); font-weight: 900; margin-bottom: 20px; cursor: pointer; display: inline-block; text-transform: uppercase; font-size: 14px;}
        
        textarea { width: 100%; background: #111; color: white; border: 1px solid #333; border-radius: 8px; padding: 15px; box-sizing: border-box; min-height: 120px; font-family: 'Inter'; margin-top: 10px; }
        .rate-input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 18px; font-weight: 900; }
        .save-btn { width: 100%; background: var(--imdb-yellow); color: black; border: none; padding: 15px; border-radius: 8px; font-weight: 900; margin-top: 15px; text-transform: uppercase; cursor: pointer; }

        .remove-btn { display: none; position: absolute; top: 5px; right: 5px; background: rgba(200,0,0,0.9); color: white; border-radius: 50%; width: 20px; height: 20px; justify-content: center; align-items: center; font-size: 12px; cursor: pointer; z-index: 10; }
        .rank-badge { position: absolute; top: 5px; left: 5px; background: var(--imdb-yellow); color: black; padding: 2px 6px; border-radius: 4px; font-weight: 900; font-size: 12px; z-index: 5; }

        .edit-link { display: none; width: fit-content; margin: 20px auto 80px auto; background: var(--imdb-yellow); color: black; padding: 10px 25px; border-radius: 25px; font-weight: 900; font-size: 13px; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .genre-btn-container { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 15px; justify-content: center; }
        .genre-btn { background: #1a1a1a; color: white; border: 1px solid #333; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .genre-btn:hover { border-color: var(--imdb-yellow); background: #252525; }

        /* --- NOUVELLE FICHE FILM XXL --- */
        .movie-details-container { margin: 0 -20px; /* Compense le padding de modal-content */ }
        
        .hero-poster-xxl { width: 100%; height: 75vh; display: block; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .movie-info-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-start; }
        .movie-info-main h2 { font-size: 24px; margin: 0; font-weight: 900; color: white; }
        .movie-metadata { font-size: 13px; color: var(--t-s); margin-top: 6px; }
        
        .score-badge-xxl { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; color: var(--imdb-yellow); border: 1px solid rgba(245, 197, 24, 0.3); white-space: nowrap;}
        
        .cast-rect-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px 20px; }
        .cast-rect-scroll::-webkit-scrollbar { display: none; }
        .actor-rect-card { flex: 0 0 110px; height: 160px; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #222; }
        .actor-rect-card img { width: 100%; height: 100%; object-fit: cover; }
        .actor-rect-name { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, black); color: white; font-size: 10px; padding: 15px 5px 5px; text-align: center; box-sizing: border-box; }
        
        .synopsis-section { padding: 20px; font-size: 15px; line-height: 1.6; color: #eee; }
        
        .my-review-white-card { background: white; margin: 20px; border-radius: 20px; padding: 20px; color: black; }
        .review-header-white { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .review-user-info { display: flex; align-items: center; gap: 12px; }
        .review-avatar-white { width: 45px; height: 45px; border-radius: 50%; display:flex; align-items:center; justify-content:center; background:#111; font-size:20px; }
        .review-user-name { font-weight: 900; font-size: 16px; margin: 0; }
        .review-stars-white { color: #555; font-size: 14px; letter-spacing: 2px; }
        .review-badge-dark { background: #111; color: white; padding: 6px 12px; border-radius: 10px; font-weight: 900; font-size: 14px; font-family: 'Orbitron'; }
        .review-text-black { font-size: 14px; line-height: 1.5; font-weight: 600; margin: 0; }
        
        .trailer-section { padding: 0 20px 20px; }
        .trailer-video { width: 100%; aspect-ratio: 16/9; border-radius: 15px; border: none; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="view"></div>
    <div class="edit-link" onclick="toggleEdit()">Modifier</div>

    <div id="fullModal" class="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal()">❮ Retour</div>
            <div id="modal-body"></div>
        </div>
    </div>

    <nav class="must-tab-bar">
        <div class="tab-item active" onclick="renderSorties()">
            <span class="tab-emoji">🍿</span>
            <span class="tab-label">Nouv.<br>Sorties</span>
        </div>
        <div class="tab-item" onclick="renderSearch()">
            <span class="tab-emoji">🔍</span>
            <span class="tab-label">Recherche</span>
        </div>
        <div class="tab-item" onclick="renderMesTop()">
            <span class="tab-emoji">🏆</span>
            <span class="tab-label">Mes Tops</span>
        </div>
        <div class="tab-item" onclick="renderCritiques()">
            <span class="tab-emoji">✍️</span>
            <span class="tab-label">Mes Critiques</span>
        </div>
    </nav>

    <script>
        const API_KEY = "f59231e7c7085af32a303eb181358453";
        const IMG_PATH = "https://image.tmdb.org/t/p/w500";
        const FIREBASE_URL = "https://cinescore-56854-default-rtdb.europe-west1.firebasedatabase.app/data.json";

        let db = {
            tops: { movies: [], series: [], actors: [] },
            reviews: []
        };

        async function loadData() {
            try {
                const res = await fetch(FIREBASE_URL);
                const cloudData = await res.json();
                if (cloudData) {
                    db = cloudData;
                    if(!db.reviews) db.reviews = [];
                    const activeTab = document.querySelector('.tab-item.active .tab-label');
                    if (activeTab) {
                        const label = activeTab.innerText;
                        if(label.includes("TOPS")) renderMesTop();
                        if(label.includes("CRITIQUES")) renderCritiques();
                    }
                }
            } catch (e) { console.error("Erreur Firebase", e); }

            if (!window.syncInterval) {
                window.syncInterval = setInterval(async () => {
                    try {
                        const res = await fetch(FIREBASE_URL);
                        const cloudData = await res.json();
                        if (cloudData && JSON.stringify(db) !== JSON.stringify(cloudData)) {
                            db = cloudData;
                            if(!db.reviews) db.reviews = [];
                            const activeTab = document.querySelector('.tab-item.active .tab-label');
                            if (activeTab) {
                                const label = activeTab.innerText;
                                if(label.includes("TOPS")) renderMesTop();
                                if(label.includes("CRITIQUES")) renderCritiques();
                            }
                        }
                    } catch (e) { }
                }, 30000);
            }
        }

        async function syncFirebase() {
            try {
                await fetch(FIREBASE_URL, {
                    method: 'PUT',
                    body: JSON.stringify(db)
                });
            } catch (e) { }
        }

        function setActive(index) {
            document.querySelectorAll('.tab-item').forEach((t, i) => {
                t.classList.toggle('active', i === index);
            });
        }

        function closeModal() {
            document.getElementById('fullModal').style.display = 'none';
            document.getElementById('modal-body').innerHTML = '';
        }

        async function renderSorties() {
            setActive(0);
            document.querySelector('.edit-link').style.display = 'none';
            document.getElementById('view').innerHTML = `
                <div class="header-ios"><h1>Nouvelles Sorties</h1></div>
                <div class="section-title">Bandes-annonces du moment</div>
                <div id="trailers-container">Chargement...</div>
            `;
            try {
                const res = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}&language=fr-FR`);
                const data = await res.json();
                let trailersHTML = '';
                
                for (let i = 0; i < 10; i++) {
                    let m = data.results[i];
                    if(!m) continue;
                    const vRes = await fetch(`https://api.themoviedb.org/3/movie/${m.id}/videos?api_key=${API_KEY}&language=fr-FR`);
                    const vData = await vRes.json();
                    let trailer = vData.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                    if (!trailer) {
                        const vResEn = await fetch(`https://api.themoviedb.org/3/movie/${m.id}/videos?api_key=${API_KEY}`);
                        const vDataEn = await vResEn.json();
                        trailer = vDataEn.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                    }
                    if (trailer) {
                        trailersHTML += `
                            <div style="margin: 0 15px 15px; position:relative; aspect-ratio:16/9; border-radius:12px; overflow:hidden; border: 1px solid #333; cursor:pointer;" onclick="playTrailer('${trailer.key}')">
                                <img src="${IMG_PATH + m.backdrop_path}" style="width:100%; height:100%; object-fit:cover;">
                                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; width:70px; height:70px; display:flex; align-items:center; justify-content:center; box-shadow: 0 0 30px rgba(0,0,0,0.5);">
                                    <div style="width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 24px solid white; margin-left: 6px;"></div>
                                </div>
                                <div style="position:absolute; bottom:0; left:0; width:100%; padding:40px 15px 15px; background:linear-gradient(transparent, rgba(0,0,0,0.9));">
                                    <div style="font-weight:900; font-size:18px; color:white;">${m.title}</div>
                                </div>
                            </div>
                        `;
                    }
                }
                document.getElementById('trailers-container').innerHTML = trailersHTML || "<div style='padding:15px;'>Aucun résultat.</div>";
            } catch(e) { }
        }

        function playTrailer(ytKey) {
            const modal = document.getElementById('fullModal');
            const body = document.getElementById('modal-body');
            modal.style.display = 'block';
            body.innerHTML = `<iframe width="100%" height="250" src="https://www.youtube.com/embed/${ytKey}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="border-radius:12px; margin-top:20px;"></iframe>`;
        }

        async function renderSearch() {
            setActive(1);
            document.querySelector('.edit-link').style.display = 'none';
            document.getElementById('view').innerHTML = `
                <div class="header-ios"><h1>Recherche</h1></div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Rechercher un film, une série ou un acteur" oninput="executeSearch(this.value)">
                </div>
                <div id="search-results-area"></div>
            `;
            loadPopularActors();
        }

        async function loadPopularActors() {
            const area = document.getElementById('search-results-area');
            if (!area) return;

            const actors = ["Denzel Washington", "Robert De Niro", "Al Pacino", "Tom Hanks", "Leonardo DiCaprio", "Bruce Willis", "Morgan Freeman", "Samuel L. Jackson", "Tom Cruise", "Brad Pitt", "Arnold Schwarzenegger", "Sylvester Stallone", "Jason Statham", "Matt Damon", "Christian Bale", "Harrison Ford", "Mark Wahlberg", "Jackie Chan", "Liam Neeson", "Jim Carrey", "Bradley Cooper", "Kiefer Sutherland", "Eddie Murphy", "Will Smith", "Whoopi Goldberg", "Angela Bassett", "Julia Roberts", "Nicole Kidman", "Viola Davis", "Halle Berry", "Angelina Jolie", "Margot Robbie"];
            const listGenres = [
                { id: 28, name: 'Action', emoji: '💥' }, { id: 80, name: 'Crime', emoji: '🩸' },
                { id: 12, name: 'Aventure', emoji: '🌍' }, { id: 14, name: 'Fantastique', emoji: '🐉' },
                { id: 36, name: 'Biopic', emoji: '📜' }, { id: 99, name: 'Documentaire', emoji: '📰' },
                { id: 18, name: 'Drame', emoji: '🥺' }, { id: 10752, name: 'Guerre', emoji: '🪖' },
                { id: 27, name: 'Horreur', emoji: '🧟‍♂️' }, { id: 878, name: 'Science-Fiction', emoji: '👽' },
                { id: 16, name: 'Animation', emoji: '👦🏻' }, { id: 10751, name: 'Familial', emoji: '🧑‍🧑‍🧒‍🧒' },
                { id: 35, name: 'Comédie', emoji: '🎭' }, { id: 10749, name: 'Romance', emoji: '💞' },
                { id: 37, name: 'Western', emoji: '🏜️' }, { id: 9648, name: 'Mystère', emoji: '🔎' },
                { id: 10402, name: 'Musical', emoji: '🎤' }, { id: 10770, name: 'Péplum', emoji: '🏛️' }
            ];
            try {
                const results = await Promise.all(actors.map(async name => {
                    const r = await fetch(`https://api.themoviedb.org/3/search/person?api_key=${API_KEY}&query=${encodeURIComponent(name)}&language=fr-FR`);
                    const d = await r.json(); return d.results[0];
                }));
                area.innerHTML = `
                    <div class="section-title">Mes acteurs préférés</div>
                    <div class="grid-3col" style="grid-template-columns: repeat(4, 1fr);">
                        ${results.map(a => a ? `<div class="poster-card" onclick="renderActorProfile(${a.id})"><img src="${a.profile_path ? IMG_PATH + a.profile_path : 'placeholder.jpg'}"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); text-align:center; font-size:7px; padding:3px;">${a.name}</div></div>` : '').join('')}
                    </div>
                    <div class="section-title">Parcourir par Genre</div>
                    <div class="genre-btn-container">
                        ${listGenres.map(g => `<button class="genre-btn" onclick="openGenreResults(${g.id}, '${g.name}')">${g.emoji} ${g.name}</button>`).join('')}
                    </div>
                `;
            } catch (e) { console.error(e); }
        }

        let searchTimeout;
        async function executeSearch(query) {
            clearTimeout(searchTimeout);
            if(query.length < 3) { loadPopularActors(); return; }
            
            searchTimeout = setTimeout(async () => {
                const area = document.getElementById('search-results-area');
                const [m, s, a] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${query}&language=fr-FR`).then(r => r.json()),
                    fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${query}&language=fr-FR`).then(r => r.json()),
                    fetch(`https://api.themoviedb.org/3/search/person?api_key=${API_KEY}&query=${query}&language=fr-FR`).then(r => r.json())
                ]);

                area.innerHTML = `
                    ${m.results.length ? `<div class="section-title">Films</div><div class="grid-3col">${m.results.slice(0,6).map(i => `<div class="poster-card" onclick="renderMovieDetails(${i.id})"><img src="${i.poster_path ? IMG_PATH + i.poster_path : ''}"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); font-size:8px; padding:5px; text-align:center;">${i.title}</div></div>`).join('')}</div>` : ''}
                    ${s.results.length ? `<div class="section-title">Séries</div><div class="grid-3col">${s.results.slice(0,6).map(i => `<div class="poster-card" onclick="renderSerieDetails(${i.id})"><img src="${i.poster_path ? IMG_PATH + i.poster_path : ''}"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); font-size:8px; padding:5px; text-align:center;">${i.name}</div></div>`).join('')}</div>` : ''}
                    ${a.results.length ? `<div class="section-title">Personnes</div><div class="grid-3col">${a.results.slice(0,6).map(i => `<div class="poster-card" onclick="renderActorProfile(${i.id})"><img src="${i.profile_path ? IMG_PATH + i.profile_path : ''}"><div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); font-size:8px; padding:5px; text-align:center;">${i.name}</div></div>`).join('')}</div>` : ''}
                `;
            }, 500);
        }

        async function openGenreResults(genreId, genreName) {
            const modal = document.getElementById('fullModal');
            const body = document.getElementById('modal-body');
            if (!modal || !body) return;

            modal.style.display = 'block';
            body.innerHTML = `
                <h2 style="font-family:'Orbitron'; color:var(--imdb-yellow); text-align:center; margin-bottom:20px;">${genreName}</h2>
                <div id="genre-grid" class="grid-3col">Chargement...</div>
            `;

            try {
                const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${genreId}&language=fr-FR&sort_by=popularity.desc`);
                const data = await res.json();
                
                document.getElementById('genre-grid').innerHTML = data.results.map(m => `
                    <div class="poster-card" onclick="renderMovieDetails(${m.id})">
                        <img src="${m.poster_path ? IMG_PATH + m.poster_path : ''}">
                        <div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); font-size:8px; padding:5px; text-align:center;">${m.title}</div>
                    </div>
                `).join('');
            } catch (e) { 
                body.innerHTML = "<p style='text-align:center;'>Erreur de chargement des films.</p>"; 
            }
        }

        /* --- FONCTIONS AJOUTÉES : DÉTAILS FILM ET SÉRIE XXL --- */
        async function renderMovieDetails(id) {
            const modal = document.getElementById('fullModal');
            const body = document.getElementById('modal-body');

                const [m, c, v] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}&language=fr-FR`).then(r => r.json()),

                    fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}&language=fr-FR`).then(r => r.json())
                ]);

                // On cherche ta critique
                const userReview = db.reviews ? db.reviews.find(r => r.name === m.title) : null;
                
                const year = m.release_date ? m.release_date.split('-')[0] : '????';
                const genres = m.genres ? m.genres.map(g => g.name).slice(0,2).join(', ') : 'Inconnu';
                const runtime = m.runtime ? `${Math.floor(m.runtime/60)}h${m.runtime%60 < 10 ? '0':''}${m.runtime%60}` : '';
                const metadata = `${genres} • ${year} ${runtime ? '• ' + runtime : ''}`;
                
                const trailer = v.results.find(vid => vid.type === 'Trailer' && vid.site === 'YouTube') || v.results[0];

                let html = `<div class="movie-details-container">`;
                html += `<img src="${m.poster_path ? IMG_PATH + m.poster_path : ''}" class="hero-poster-xxl">`;

                    <div class="movie-info-bar">
                        <div class="movie-info-main">
                            <h2>${m.title}</h2>
                            <div class="movie-metadata">${metadata}</div>
                        </div>
                        <div class="score-badge-xxl">⭐ ${m.vote_average ? m.vote_average.toFixed(1) : '?'}/10</div>
                    </div>
                `;

                if (c.cast && c.cast.length > 0) {
                    html += `<div class="cast-rect-scroll">`;
                    c.cast.slice(0, 15).forEach(actor => {
                        html += `
                            <div class="actor-rect-card" onclick="renderActorProfile(${actor.id})">
                                <img src="${actor.profile_path ? IMG_PATH + actor.profile_path : 'https://via.placeholder.com/150x200?text=Photo'}">
                                <div class="actor-rect-name">${actor.name}</div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                html += `<div class="synopsis-section">${m.overview || "Aucun synopsis disponible."}</div>`;

                if (userReview) {
                    const starsFull = "★".repeat(Math.ceil(userReview.note / 2));
                    const starsEmpty = "☆".repeat(5 - Math.ceil(userReview.note / 2));
                    html += `
                        <div class="my-review-white-card">
                            <div class="review-header-white">
                                <div class="review-user-info">
                                    <div class="review-avatar-white">🧑‍💻</div>
                                    <div>
                                        <p class="review-user-name">Lucas Desvaux</p>
                                        <div class="review-stars-white">${starsFull}${starsEmpty}</div>
                                    </div>
                                </div>
                                <div class="review-badge-dark">★ ${userReview.note}</div>
                            </div>
                            <p class="review-text-black">"${userReview.text}"</p>
                        </div>
                    `;
                }

                if (trailer) {
                    html += `
                        <div class="trailer-section">
                            <iframe class="trailer-video" src="https://www.youtube.com/embed/${trailer.key}" frameborder="0" allowfullscreen></iframe>
                        </div>
                    `;
                }

                html += `</div>`;
                body.innerHTML = html;
            } catch (e) {
                body.innerHTML = "Erreur de chargement des détails.";
            }
        }

        async function renderActorProfile(id) {
            const modal = document.getElementById('fullModal');
            const body = document.getElementById('modal-body');
            modal.style.display = 'block';
            body.innerHTML = `<div style="text-align:center; padding:50px; color:var(--imdb-yellow);">Chargement...</div>`;
            try {
                const [p, c] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/person/${id}?api_key=${API_KEY}&language=fr-FR`).then(r => r.json()),
                    fetch(`https://api.themoviedb.org/3/person/${id}/combined_credits?api_key=${API_KEY}&language=fr-FR`).then(r => r.json())
                ]);
                const sortByDate = (a, b) => {
                    const dateA = new Date(a.release_date || a.first_air_date || '1900-01-01');
                    const dateB = new Date(b.release_date || b.first_air_date || '1900-01-01');
                    return dateB - dateA;
                };
                const movies = c.cast.filter(m => m.media_type === 'movie').sort(sortByDate);
                const series = c.cast.filter(m => m.media_type === 'tv').sort(sortByDate);
                body.innerHTML = `
                    <div style="display:flex; gap:20px; margin-bottom:30px;">
                        <img src="${IMG_PATH + p.profile_path}" style="width:100px; border-radius:10px;">
                        <div>
                            <h2 style="font-family:'Orbitron'; color:var(--imdb-yellow);">${p.name}</h2>
                            <p style="font-size:12px; opacity:0.8;">${p.biography ? p.biography.substring(0, 150) + '...' : ''}</p>
                        </div>
                    </div>

                    <div class="section-title">🎬 Films (${movies.length})</div>
                    <div class="h-scroll" style="margin-bottom:20px;">
                        ${movies.map(m => `
                            <div class="poster-card" style="flex:0 0 100px;" onclick="renderMovieDetails(${m.id})">
                                <img src="${m.poster_path ? IMG_PATH + m.poster_path : ''}">
                                <div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); font-size:8px; padding:2px; text-align:center;">
                                    ${(m.release_date || '????').split('-')[0]}
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="section-title">📺 Séries (${series.length})</div>
                    <div class="h-scroll">
                        ${series.map(s => `
                            <div class="poster-card" style="flex:0 0 100px;" onclick="renderSerieDetails(${s.id})">
                                <img src="${s.poster_path ? IMG_PATH + s.poster_path : ''}">
                                <div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.8); font-size:8px; padding:2px; text-align:center;">
                                    ${(s.first_air_date || '????').split('-')[0]}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {
                body.innerHTML = "Erreur de chargement";
            }
        }

        function renderMesTop() {
            setActive(2);
            document.querySelector('.edit-link').style.display = 'block';
            document.getElementById('view').innerHTML = `<div class="header-ios"><h1>Mes GOAT</h1></div>${buildTopSection('- Films', 'movies')}${buildTopSection('- Séries', 'series')}${buildTopSection('- Footballeurs', 'actors')}`;
        }

        function buildTopSection(title, type) {
            const list = db.tops[type] || [];
            let html = `<div class="section-title">Top 12 ${title}</div><div class="grid-3col">`;
            
            list.forEach((item, index) => {
                html += `<div class="poster-card" style="width:100%;">
                            <div class="rank-badge">#${index + 1}</div>
                            <button class="remove-btn" onclick="removeFromTop('${type}', ${index})">×</button>
                            ${item.img ? `<img src="${item.img}">` : `<div class="no-poster">${item.name}</div>`}
                        </div>`;
            });

            if (list.length < 12) {
                html += `
                <div class="poster-card add-card" style="width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; border: 2px dashed #444; border-radius:12px; min-height:150px;" onclick="openAddTopModal('${type}')">
                    <span style="font-size:30px; margin-bottom:10px;">➕</span>
                    <span style="font-size:12px; color:#aaa; font-weight:bold; text-transform:uppercase;">Ajouter</span>
                </div>`;
            }

            return html + `</div>`;
        }

        async function removeFromTop(type, index) { db.tops[type].splice(index, 1); await syncFirebase(); renderMesTop(); }

        function openAddTopModal(type) {
            const modal = document.getElementById('fullModal');
            modal.style.display = 'block';
            let q = type === 'movies' ? 'movie' : (type === 'series' ? 'tv' : 'person');
            document.getElementById('modal-body').innerHTML = `<h2>Ajouter</h2><input type="text" class="rate-input" placeholder="Chercher..." oninput="searchForTop(this.value, '${q}', '${type}')"><div id="top-search-results" class="grid-3col" style="padding:20px 0;"></div>`;
        }

        async function searchForTop(query, apiType, dbType) {
            if(query.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/${apiType}?api_key=${API_KEY}&query=${query}&language=fr-FR`).then(r => r.json());
            document.getElementById('top-search-results').innerHTML = res.results.slice(0,6).map(item => `<div class="poster-card" style="width:100%;" onclick="addToTop('${dbType}', '${item.title || item.name}', '${item.poster_path || item.profile_path}')"><img src="${IMG_PATH + (item.poster_path || item.profile_path)}"></div>`).join('');
        }

        async function addToTop(type, name, img) { 
            db.tops[type].push({ name, img: img !== 'null' ? IMG_PATH + img : null });
            await syncFirebase(); closeModal(); renderMesTop(); 
        }

        function renderCritiques() {
            setActive(3);
            const reviews = db.reviews || [];
            document.getElementById('view').innerHTML = `
                <div class="brand-title">CINÉ SCORE <br><span>by @wb10officiel</span></div>
                <div class="header-ios"><h1>Mes Critiques</h1></div>
                <button class="btn-big-add" onclick="openAddReviewModal()">+</button>
                <div class="stats-ribbon">
                    <div class="stat-box"><span class="stat-val">${reviews.filter(r=>r.type==='movie').length}</span><span class="stat-lbl">Films</span></div>
                    <div class="stat-box"><span class="stat-val">${reviews.filter(r=>r.type==='tv').length}</span><span class="stat-lbl">Séries</span></div>
                </div>
                <div>${reviews.slice().reverse().map((r, i) => `<div class="review-card">${r.img ? `<img src="${r.img}" class="review-poster">` : ''}<div style="flex:1;"><div style="display:flex; justify-content:space-between;"><h3>${r.name}</h3><div class="review-note" style="background:${r.note>=7?'#4caf50':r.note>=5?'#ff9800':'#f44336'}">${r.note}/10</div></div><p class="review-text">"${r.text}"</p><button onclick="deleteReview(${reviews.length-1-i})" style="color:#666; border:none; background:none; font-size:10px;">Supprimer</button></div></div>`).join('')}</div>
            `;
        }

        async function deleteReview(i) { db.reviews.splice(i, 1); await syncFirebase(); renderCritiques(); }

        function openAddReviewModal() {
            const modal = document.getElementById('fullModal');
            modal.style.display = 'block';
            document.getElementById('modal-body').innerHTML = `<h2>Nouvelle Critique</h2><input type="text" class="rate-input" placeholder="Chercher..." oninput="searchForReview(this.value)"><div id="review-search-results" class="grid-3col" style="padding:20px 0;"></div>`;
        }

        async function searchForReview(q) {
            if(q.length < 3) return;
            const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}&language=fr-FR`).then(r => r.json());
            const filtered = res.results.filter(item => item.media_type === 'movie' || item.media_type === 'tv');
            document.getElementById('review-search-results').innerHTML = filtered.slice(0,6).map(item => `<div class="poster-card" style="width:100%;" onclick="showReviewForm('${item.media_type}', '${item.title || item.name}', '${item.poster_path}')"><img src="${IMG_PATH + item.poster_path}"></div>`).join('');
        }

        function showReviewForm(type, name, img) {
            document.getElementById('modal-body').innerHTML = `<h2>${name}</h2><label>Note /10</label><input type="number" id="rev-note" class="rate-input" min="1" max="10"><label>Critique</label><textarea id="rev-text"></textarea><button class="save-btn" onclick="saveReview('${type}', '${name}', '${img}')">Sauvegarder</button>`;
        }

        async function saveReview(type, name, img) {
            const note = parseInt(document.getElementById('rev-note').value);
            const text = document.getElementById('rev-text').value;
            db.reviews.push({ type, name, img: img !== 'null' ? IMG_PATH + img : null, note, text });
            await syncFirebase(); closeModal(); renderCritiques();
        }

        loadData().then(() => renderSorties());
        
        function toggleEdit() {
            const btns = document.querySelectorAll('.remove-btn');
            btns.forEach(btn => {
                if (btn.style.display === 'flex') {
                    btn.style.display = 'none';
                } else {
                    btn.style.display = 'flex';
                }
            });
        }
    </script>
</body>
</html>
